<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sticker Interaction</title>

  <script src="https://unpkg.com/@rive-app/canvas@latest"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #111111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, Arial, sans-serif;
    }

    .card {
      background: #282828;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    }

    .rive-wrap {
      width: 393px;
      height: 614px;
      border-radius: 15px;
      overflow: hidden;
      background: #1b1b1b;
    }

    canvas {
      width: 393px;
      height: 614px;
      display: block;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="rive-wrap">
      <canvas id="canvas" width="393" height="614"></canvas>
    </div>
  </div>

  <script>
    const r = new rive.Rive({
      src: "stickers.riv",
      canvas: document.getElementById("canvas"),
      autoplay: true,
      stateMachines: "State Machine 1"
    });
  </script>
</body>
</html>
