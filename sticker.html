<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sticker Interaction</title>

  <script src="https://unpkg.com/@rive-app/canvas@latest"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #111111;
      font-family: Inter, Arial, sans-serif;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 980px;
      padding: 32px;
    }

    .card {
      background: #282828;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    }

    .preview {
      background: #1b1b1b;
      border-radius: 20px;
      min-height: 720px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .rive-mask {
      width: 393px;
      height: 614px;
      border-radius: 15px;
      overflow: hidden;
    }

    canvas {
      width: 393px;
      height: 614px;
      display: block;
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">
      <div class="preview">
        <div class="rive-mask">
          <canvas id="canvas" width="393" height="614"></canvas>
        </div>
      </div>
    </section>
  </main>

  <script>
const r = new rive.Rive({
  src: "stickers.riv",
  canvas: canvas,
  artboard: "refModal Stickers",
  autoplay: true,

  layout: new rive.Layout({
    fit: rive.Fit.Contain,
    alignment: rive.Alignment.Center
  }),

  onLoad: () => {
    r.resizeDrawingSurfaceToCanvas();
  }
});
  </script>
</body>
</html>
